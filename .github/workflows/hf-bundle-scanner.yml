# Docker image for hf_bundle_scanner (CLI smoke). Unit tests run in `llm-scanner.yml` to avoid duplicate matrices.
name: hf-bundle-scanner

on:
  push:
    branches: [main, master]
    paths:
      - "hf_bundle_scanner/**"
      - "model-admission/**"
      - "Makefile"
      - ".github/workflows/hf-bundle-scanner.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "hf_bundle_scanner/**"
      - "model-admission/**"
      - "Makefile"
      - ".github/workflows/hf-bundle-scanner.yml"
  workflow_dispatch:

jobs:
  docker-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build bundle image
        run: docker build -f hf_bundle_scanner/Dockerfile -t hf-bundle-scanner:ci .
      - name: Smoke CLI
        run: docker run --rm hf-bundle-scanner:ci manifest --help

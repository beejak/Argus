name: hf-bundle-scanner

on:
  push:
    branches: [main, master]
    paths:
      - "hf_bundle_scanner/**"
      - "model-admission/**"
      - "Makefile"
      - ".github/workflows/hf-bundle-scanner.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "hf_bundle_scanner/**"
      - "model-admission/**"
      - "Makefile"
      - ".github/workflows/hf-bundle-scanner.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install model-admission + hf-bundle-scanner
        run: |
          python -m pip install -U pip
          pip install -e "./model-admission[dev]"
          pip install -e "./hf_bundle_scanner[dev,mcp,http]"
      - name: Pytest
        run: |
          cd hf_bundle_scanner && python -m pytest tests -v --tb=short -m "not integration"

  docker-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build bundle image
        run: docker build -f hf_bundle_scanner/Dockerfile -t hf-bundle-scanner:ci .
      - name: Smoke CLI
        run: docker run --rm hf-bundle-scanner:ci manifest --help

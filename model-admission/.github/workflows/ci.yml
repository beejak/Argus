# Runs when this directory is the Git repository root (typical: copy folder → new repo → push).
# If you keep it inside a monorepo instead, move this file to the repo root and set defaults.run.working-directory.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install + test
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pytest -v --tb=short

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install -U pip build
          python -m build
      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          admit-model --version

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build worker image
        run: docker build -t model-admission:ci .
      - name: Smoke-run CLI in image
        run: |
          docker run --rm model-admission:ci scan --help
